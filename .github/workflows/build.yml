name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - name: Instalar Python 3.11 do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y python3.11 python3.11-dev python3.11-venv python3-pip \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev \
          build-essential ccache
        sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
        python3 --version

    - name: Instalar Buildozer e Cython
      run: |
        python3.11 -m pip install --upgrade pip
        python3.11 -m pip install buildozer==1.5.0 cython==0.29.33

    - name: Aceitar licencas SDK
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" "build-tools;33.0.2" "platform-tools" || true

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    - name: Compilar APK
      env:
        ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
        ANDROIDNDK: ${{ env.ANDROID_NDK_ROOT }}
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
      run: |
        python3.11 -m buildozer android debug 2>&1 | tee build.log

    - name: Salvar APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: |
          bin/*.apk
          build.log
        retention-days: 7
