name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer e Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.33

    - name: Cache Android SDK/NDK
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: android-${{ hashFiles('buildozer.spec') }}
        restore-keys: android-

    - name: Compilar APK
      run: yes | buildozer android debug 2>&1 | tee build.log

    - name: Salvar APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: |
          bin/*.apk
          build.log
        retention-days: 7
