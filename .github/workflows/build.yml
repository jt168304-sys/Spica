name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y python3.11 python3.11-dev python3.11-venv \
          git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev build-essential ccache

    - name: Instalar pip e buildozer
      run: |
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
        python3.11 -m pip install --upgrade pip
        python3.11 -m pip install git+https://github.com/kivy/buildozer.git cython==0.29.33

    - name: Preparar Android SDK
      run: |
        SDK=/usr/local/lib/android/sdk
        SDKMANAGER=$SDK/cmdline-tools/latest/bin/sdkmanager

        # Aceitar todas as licencas
        yes | $SDKMANAGER --licenses || true

        # Instalar build-tools e plataforma
        $SDKMANAGER "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true

        # Fake 'android' binary
        mkdir -p $SDK/tools/bin
        printf '#!/bin/sh\necho "Android SDK Tool"\nexit 0\n' | sudo tee $SDK/tools/android
        printf '#!/bin/sh\necho "Android SDK Tool"\nexit 0\n' | sudo tee $SDK/tools/bin/android
        sudo chmod +x $SDK/tools/android $SDK/tools/bin/android

        # Symlink aidl
        AIDL=$(find $SDK/build-tools/33.0.2 -name "aidl" 2>/dev/null | head -1)
        echo "aidl: $AIDL"
        sudo ln -sf $AIDL /usr/local/bin/aidl

        echo "Pronto. build-tools:"
        ls $SDK/build-tools/

    - name: Cache p4a
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-v7-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-v7-

    - name: Compilar APK
      env:
        GIT_TERMINAL_PROMPT: "0"
        GIT_ASKPASS: "echo"
      run: |
        set -o pipefail
        python3.11 -m buildozer android debug 2>&1 | tee build.log

    - name: Localizar e copiar APK
      if: always()
      run: |
        mkdir -p artifacts
        cp build.log artifacts/ 2>/dev/null || true
        find /home/runner $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null -exec cp {} artifacts/ \;
        ls -lh artifacts/

    - name: Salvar artefatos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: artifacts/
        retention-days: 7
