name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y python3.11 python3.11-dev python3.11-venv \
          git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev build-essential ccache

    - name: Instalar pip e buildozer
      run: |
        curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11
        python3.11 -m pip install --upgrade pip
        python3.11 -m pip install git+https://github.com/kivy/buildozer.git cython==0.29.33

    - name: Preparar Android SDK para buildozer
      run: |
        SDK=$ANDROID_SDK_ROOT
        # Buildozer precisa do binario 'android' que nao existe no SDK moderno
        mkdir -p $SDK/tools/bin
        # Fake 'android' binary
        printf '#!/bin/sh\necho "Android SDK Tool"\nexit 0\n' | sudo tee $SDK/tools/android
        printf '#!/bin/sh\necho "Android SDK Tool"\nexit 0\n' | sudo tee $SDK/tools/bin/android
        sudo chmod +x $SDK/tools/android $SDK/tools/bin/android
        # Symlink sdkmanager
        ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager 2>/dev/null || true
        # Aceitar licencas
        yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
        echo "SDK pronto: $(ls $SDK/tools/)"

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-v5-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-v5-

    - name: Compilar APK
      env:
        GIT_TERMINAL_PROMPT: "0"
        GIT_ASKPASS: "echo"
        ANDROIDSDK: "/usr/local/lib/android/sdk"
        ANDROIDNDK: "/usr/local/lib/android/sdk/ndk/27.3.13750724"
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
      run: |
        set -o pipefail
        python3.11 -m buildozer android debug 2>&1 | tee build.log

    - name: Localizar e copiar APK
      if: always()
      run: |
        mkdir -p artifacts
        cp build.log artifacts/ 2>/dev/null || true
        find /home/runner $GITHUB_WORKSPACE -name "*.apk" 2>/dev/null -exec cp {} artifacts/ \;
        ls -lh artifacts/

    - name: Salvar artefatos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: artifacts/
        retention-days: 7
