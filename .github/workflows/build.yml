name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - name: Verificar ambiente
      run: |
        python3 --version
        buildozer --version

    - name: Pre-aceitar licencas
      run: |
        mkdir -p /root/.buildozer/android/platform/android-sdk/licenses
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n859f317696f67ef3d7f30a50a5560e7834b43903" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd" > /root/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: /root/.buildozer
        key: buildozer-docker-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-docker-

    - name: Compilar APK
      env:
        GIT_TERMINAL_PROMPT: "0"
        GIT_ASKPASS: "echo"
      run: |
        buildozer android debug 2>&1 | tee build.log

    - name: Encontrar APK
      if: always()
      run: |
        mkdir -p bin
        find . -name "*.apk" 2>/dev/null | while read f; do
          echo "APK: $f"
          cp "$f" bin/
        done
        ls -lh bin/ || echo "Sem APK"

    - name: Salvar APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: |
          bin/
          build.log
        retention-days: 7
