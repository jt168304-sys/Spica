name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev build-essential ccache

    - name: Instalar Buildozer e Cython
      run: |
        pip install --upgrade pip
        pip install git+https://github.com/kivy/buildozer.git cython==0.29.33

    - name: Aceitar licencas SDK
      run: |
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "platforms;android-33" "build-tools;33.0.2" "platform-tools" || true

    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: buildozer-

    - name: Compilar APK
      run: |
        buildozer android debug 2>&1 | tee build.log

    - name: Encontrar e copiar APK
      if: always()
      run: |
        echo "=== Buscando APKs ==="
        find . -name "*.apk" 2>/dev/null
        mkdir -p bin
        find . -name "*.apk" -exec cp {} bin/ \; 2>/dev/null || true
        ls -la bin/ || echo "Pasta bin vazia"

    - name: Salvar APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: WindIA-APK
        path: |
          bin/
          build.log
        retention-days: 7
