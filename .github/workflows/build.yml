name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Delete old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '1 day'
          skip-tags: false
        continue-on-error: true

      - name: Install Android SDK components
        run: |
          yes | sdkmanager "build-tools;33.0.2" "platforms;android-33" "platforms;android-31" || true

      - name: Build APK
        run: yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spica-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 3

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log
          retention-days: 1
