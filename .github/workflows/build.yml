name: Build WindIA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Permite rodar manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
    - name: Baixar código
      uses: actions/checkout@v3

    - name: Instalar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependências do sistema
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk \
          autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev

    - name: Instalar Buildozer e Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.33

    - name: Cache do Android SDK/NDK (acelera builds futuras)
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.android
        key: android-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: android-buildozer-

    - name: Compilar APK
      run: |
        cd $GITHUB_WORKSPACE
        yes | buildozer android debug 2>&1 | tee build.log

    - name: Salvar APK como artefato
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: WindIA-APK
        path: |
          bin/*.apk
          build.log
        retention-days: 7
